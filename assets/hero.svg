<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Idder — Full-Stack Engineer · Systems, Web, Commerce · Agadir, Morocco">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="1" stop-color="#0c0b0e"/>
    </linearGradient>
    <linearGradient id="scanLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c0c0c0"/>
    </linearGradient>
    <linearGradient id="divRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.85" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="nameGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="2" result="sat"/>
      <feMerge><feMergeNode in="sat"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="1280" height="420"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1280" height="420" fill="url(#bg)"/>

    <!-- Barely-visible grid texture -->
    <g stroke="#0f0f0f" stroke-width="1">
      <line x1="0" y1="70" x2="1280" y2="70"/>
      <line x1="0" y1="350" x2="1280" y2="350"/>
      <line x1="730" y1="70" x2="730" y2="350"/>
    </g>

    <!-- TOP BAR -->
    <circle cx="52" cy="36" r="3.5" fill="#1fce6b">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="66" y="40"
      font-family="'SF Mono','Cascadia Code','Fira Code',ui-monospace,monospace"
      font-size="11" letter-spacing="2.5" fill="#383838">SYS://IDDER_29 — ONLINE</text>

    <text x="1228" y="40" text-anchor="end"
      font-family="'SF Mono',ui-monospace,monospace"
      font-size="11" letter-spacing="2" fill="#282828">AGADIR · MOROCCO · 2026</text>

    <!-- GIANT NAME — the visual centrepiece -->
    <text x="52" y="290"
      font-family="'Arial Black','Helvetica Neue',Impact,'Franklin Gothic Heavy',sans-serif"
      font-weight="900"
      font-size="196"
      letter-spacing="-6"
      fill="url(#nameSheen)">IDDER</text>

    <!-- Name glow layer — very subtle -->
    <text x="52" y="290"
      font-family="'Arial Black','Helvetica Neue',Impact,'Franklin Gothic Heavy',sans-serif"
      font-weight="900"
      font-size="196"
      letter-spacing="-6"
      fill="#ffffff"
      opacity="0.04"
      filter="url(#nameGlow)">IDDER</text>

    <!-- Surname — quietly below -->
    <text x="56" y="326"
      font-family="'Helvetica Neue',Arial,sans-serif"
      font-size="15"
      letter-spacing="10"
      fill="#333333">AIT ELMOUDEN</text>

    <!-- RIGHT COLUMN — role + stack -->
    <!-- Thin top rule of right column -->
    <rect x="762" y="108" width="466" height="1" fill="url(#divRule)"/>

    <text x="762" y="134"
      font-family="'Helvetica Neue',Arial,sans-serif"
      font-size="11" letter-spacing="5" fill="#484848"
      font-weight="600">FULL-STACK ENGINEER</text>

    <!-- Stack lines — tight, specific, no fluff -->
    <g font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" fill="#858585">
      <text x="762" y="178">Systems &amp; C</text>
      <text x="762" y="208">React &nbsp;·&nbsp; Next.js &nbsp;·&nbsp; TypeScript</text>
      <text x="762" y="238">Node.js &nbsp;·&nbsp; NestJS &nbsp;·&nbsp; Python</text>
      <text x="762" y="268">Shopify &nbsp;·&nbsp; Liquid</text>
      <text x="762" y="298">React Native</text>
    </g>

    <!-- Thin bottom rule of right column -->
    <rect x="762" y="318" width="466" height="1" fill="url(#divRule)"/>

    <!-- Availability — specific and clean -->
    <circle cx="764" cy="342" r="3" fill="#1fce6b" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="776" y="346"
      font-family="'Helvetica Neue',Arial,sans-serif"
      font-size="12" letter-spacing="2" fill="#404040">AVAILABLE — FREELANCE &amp; FULL-TIME</text>

    <!-- SCAN LINE — the one animation, extremely subtle -->
    <rect x="762" y="70" width="2" height="280" fill="url(#scanLine)" opacity="0.7">
      <animate attributeName="x" values="762;1228;762" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </rect>

    <!-- BOTTOM BAR -->
    <rect x="0" y="358" width="1280" height="1" fill="url(#divRule)"/>

    <text x="52" y="390"
      font-family="'SF Mono',ui-monospace,monospace"
      font-size="11" letter-spacing="2" fill="#252525">1337 SCHOOL / 42 NETWORK &nbsp;·&nbsp; 68 REPOSITORIES &nbsp;·&nbsp; BUILT FROM SCRATCH</text>

    <text x="1228" y="390" text-anchor="end"
      font-family="'SF Mono',ui-monospace,monospace"
      font-size="11" letter-spacing="1.5" fill="#252525">portfolio-nu-six-19.vercel.app</text>
  </g>
</svg>
