<svg width="100%" viewBox="0 0 860 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0d1326"/>
    </linearGradient>
    <linearGradient id="cbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2bd4a8"/>
      <stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
    <linearGradient id="crule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#5ad8ff" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#5ad8ff"/>
      <stop offset="0.7" stop-color="#bb9af7"/>
      <stop offset="1"   stop-color="#bb9af7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect width="860" height="80" rx="10" fill="url(#cbg)"/>

  <!-- subtle grid line -->
  <line x1="0" y1="40" x2="860" y2="40" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- left accent bar -->
  <rect x="0" y="0" width="3" height="80" rx="1.5" fill="url(#cbar)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- terminal prompt -->
  <text x="22" y="30" font-family="'SF Mono','JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="13">
    <tspan fill="#2bd4a8" font-weight="600">idder@1337</tspan><tspan fill="#3d4a6e">:~$ </tspan><tspan fill="#c8d3f5">./say-hi</tspan><tspan fill="#5ad8ff" dx="5">▌<animate attributeName="fill-opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite" calcMode="discrete"/></tspan>
  </text>

  <!-- horizontal rule -->
  <rect x="22" y="39" width="440" height="1" fill="url(#crule)" opacity="0.35"/>

  <!-- channel names with accent dots -->
  <text x="22" y="60" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" letter-spacing="0.2">
    <tspan fill="#5ad8ff">◉</tspan><tspan fill="#8694b8" dx="5">Portfolio</tspan>
    <tspan fill="#7aa2f7" dx="22">◉</tspan><tspan fill="#8694b8" dx="5">LinkedIn</tspan>
    <tspan fill="#f3a4dd" dx="22">◉</tspan><tspan fill="#8694b8" dx="5">Email</tspan>
    <tspan fill="#bb9af7" dx="22">◉</tspan><tspan fill="#8694b8" dx="5">GitHub</tspan>
  </text>
</svg>
