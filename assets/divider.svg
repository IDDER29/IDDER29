<svg width="1280" height="10" viewBox="0 0 1280 10" fill="none" xmlns="http://www.w3.org/2000/svg" role="presentation">
  <defs>
    <linearGradient id="dv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a5f3fc" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff2e88" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.5 0;0.5 0;-0.5 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="dg" x="-20%" y="-400%" width="140%" height="900%"><feGaussianBlur stdDeviation="1.2"/></filter>
  </defs>
  <rect x="0" y="4" width="1280" height="1.6" rx="1" fill="url(#dv)" filter="url(#dg)"/>
  <circle cx="640" cy="5" r="3" fill="#a5f3fc">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
