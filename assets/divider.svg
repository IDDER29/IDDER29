<svg width="1200" height="8" viewBox="0 0 1200 8" fill="none" xmlns="http://www.w3.org/2000/svg" role="presentation">
  <defs>
    <linearGradient id="d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#818cf8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.5 0;0.5 0;-0.5 0" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="0" y="3" width="1200" height="2" rx="1" fill="url(#d)"/>
  <circle cx="600" cy="4" r="3" fill="#818cf8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
