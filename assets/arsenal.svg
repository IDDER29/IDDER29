<svg width="1280" height="330" viewBox="0 0 1280 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arsenal — tech stack matrix">
  <defs>
    <linearGradient id="aSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0613"/>
      <stop offset="1" stop-color="#070410"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a5f3fc"/>
      <stop offset="1" stop-color="#ff2e88"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.6 0;0.6 0;-0.6 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <pattern id="aGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#12121f" stroke-width="1"/>
    </pattern>
    <filter id="aNeon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="aCard"><rect x="1" y="1" width="1278" height="328" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#aCard)">
    <rect width="1280" height="330" fill="url(#aSky)"/>
    <rect width="1280" height="330" fill="url(#aGrid)"/>

    <!-- title -->
    <g font-family="ui-monospace, 'SFMono-Regular', 'Cascadia Code', Menlo, Consolas, monospace">
      <text x="44" y="56" font-size="22" font-weight="700" fill="#22d3ee" letter-spacing="3" filter="url(#aNeon)">// ARSENAL</text>
      <text x="214" y="56" font-size="13" fill="#3f5168" letter-spacing="3">— STACK MATRIX</text>
      <text x="1236" y="56" font-size="12" fill="#3f5168" letter-spacing="3" text-anchor="end">08 SYSTEMS · ONLINE</text>
    </g>
    <rect x="44" y="74" width="1192" height="1" fill="#1b2b3a"/>

    <!-- column headers -->
    <g font-family="ui-monospace, monospace" font-size="14" font-weight="700" letter-spacing="4">
      <text x="44" y="120" fill="#5eead4" filter="url(#aNeon)">INTERFACE</text>
      <rect x="44" y="130" width="58" height="2" fill="#5eead4" filter="url(#aNeon)"/>
      <text x="674" y="120" fill="#f0abfc" filter="url(#aNeon)">ENGINE &amp; SYSTEMS</text>
      <rect x="674" y="130" width="58" height="2" fill="#f0abfc" filter="url(#aNeon)"/>
    </g>

    <!-- bars: each = label, track, fill, end-dot, value -->
    <g font-family="ui-monospace, monospace" font-size="13" fill="#cfe6ff" letter-spacing="1">
      <!-- LEFT COLUMN -->
      <text x="44" y="167">React / Next.js</text>
      <rect x="240" y="158" width="300" height="9" rx="4.5" fill="#15202e"/>
      <rect x="240" y="158" width="282" height="9" rx="4.5" fill="url(#barFill)" filter="url(#aNeon)"/>
      <circle cx="522" cy="162.5" r="4" fill="#ff8fc4" filter="url(#aNeon)"><animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/></circle>
      <text x="552" y="167" fill="#7f93a8">94</text>

      <text x="44" y="215">TypeScript</text>
      <rect x="240" y="206" width="300" height="9" rx="4.5" fill="#15202e"/>
      <rect x="240" y="206" width="270" height="9" rx="4.5" fill="url(#barFill)" filter="url(#aNeon)"/>
      <circle cx="510" cy="210.5" r="4" fill="#ff8fc4" filter="url(#aNeon)"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/></circle>
      <text x="552" y="215" fill="#7f93a8">90</text>

      <text x="44" y="263">Tailwind CSS</text>
      <rect x="240" y="254" width="300" height="9" rx="4.5" fill="#15202e"/>
      <rect x="240" y="254" width="258" height="9" rx="4.5" fill="url(#barFill)" filter="url(#aNeon)"/>
      <circle cx="498" cy="258.5" r="4" fill="#ff8fc4" filter="url(#aNeon)"><animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/></circle>
      <text x="552" y="263" fill="#7f93a8">86</text>

      <text x="44" y="311">Angular · Redux</text>
      <rect x="240" y="302" width="300" height="9" rx="4.5" fill="#15202e"/>
      <rect x="240" y="302" width="234" height="9" rx="4.5" fill="url(#barFill)" filter="url(#aNeon)"/>
      <circle cx="474" cy="306.5" r="4" fill="#ff8fc4" filter="url(#aNeon)"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
      <text x="552" y="311" fill="#7f93a8">78</text>

      <!-- RIGHT COLUMN -->
      <text x="674" y="167">Node.js / NestJS</text>
      <rect x="870" y="158" width="300" height="9" rx="4.5" fill="#15202e"/>
      <rect x="870" y="158" width="270" height="9" rx="4.5" fill="url(#barFill)" filter="url(#aNeon)"/>
      <circle cx="1140" cy="162.5" r="4" fill="#ff8fc4" filter="url(#aNeon)"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
      <text x="1182" y="167" fill="#7f93a8">90</text>

      <text x="674" y="215">C / Systems</text>
      <rect x="870" y="206" width="300" height="9" rx="4.5" fill="#15202e"/>
      <rect x="870" y="206" width="252" height="9" rx="4.5" fill="url(#barFill)" filter="url(#aNeon)"/>
      <circle cx="1122" cy="210.5" r="4" fill="#ff8fc4" filter="url(#aNeon)"><animate attributeName="opacity" values="1;0.3;1" dur="2.0s" repeatCount="indefinite"/></circle>
      <text x="1182" y="215" fill="#7f93a8">84</text>

      <text x="674" y="263">Python</text>
      <rect x="870" y="254" width="300" height="9" rx="4.5" fill="#15202e"/>
      <rect x="870" y="254" width="240" height="9" rx="4.5" fill="url(#barFill)" filter="url(#aNeon)"/>
      <circle cx="1110" cy="258.5" r="4" fill="#ff8fc4" filter="url(#aNeon)"><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></circle>
      <text x="1182" y="263" fill="#7f93a8">80</text>

      <text x="674" y="311">Shopify · Liquid</text>
      <rect x="870" y="302" width="300" height="9" rx="4.5" fill="#15202e"/>
      <rect x="870" y="302" width="246" height="9" rx="4.5" fill="url(#barFill)" filter="url(#aNeon)"/>
      <circle cx="1116" cy="306.5" r="4" fill="#ff8fc4" filter="url(#aNeon)"><animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite"/></circle>
      <text x="1182" y="311" fill="#7f93a8">82</text>
    </g>
  </g>

  <rect x="1" y="1" width="1278" height="328" rx="18" fill="none" stroke="#22d3ee" stroke-width="1.4" opacity="0.35"/>
  <g stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.7" filter="url(#aNeon)">
    <path d="M22 50 L22 24 L48 24"/>
    <path d="M1258 280 L1258 306 L1232 306"/>
  </g>
</svg>
