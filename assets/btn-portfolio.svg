<svg width="210" height="52" viewBox="0 0 210 52" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PORTFOLIO">
  <defs>
    <filter id="g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.10"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.6 0;0.6 0;-0.6 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="206" height="48" rx="24" fill="#0a0613"/>
  <rect x="2" y="2" width="206" height="48" rx="24" fill="url(#sheen)"/>
  <rect x="2" y="2" width="206" height="48" rx="24" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.85" filter="url(#g)"/>
  <circle cx="34" cy="26" r="4.5" fill="#22d3ee" filter="url(#g)">
    <animate attributeName="opacity" values="1;0.35;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="116" y="31" text-anchor="middle" font-family="ui-monospace, 'SFMono-Regular', 'Cascadia Code', Menlo, Consolas, monospace" font-size="15" font-weight="700" letter-spacing="3" fill="#eaf6ff">PORTFOLIO</text>
</svg>
