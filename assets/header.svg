<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Idder Ait Elmouden — Software Engineer">
  <defs>

    <!-- Background — deeper, near-black with blue undertone -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080c14"/>
      <stop offset="1" stop-color="#0c1020"/>
    </linearGradient>

    <!-- Ambient depth left (behind name) -->
    <radialGradient id="leftGlow" cx="0.2" cy="0.62" r="0.52" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#1a2560" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#080c14" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient depth right -->
    <radialGradient id="rightGlow" cx="0.86" cy="0.38" r="0.42" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#28184e" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#080c14" stop-opacity="0"/>
    </radialGradient>

    <!-- Name gradient: white → cool blue-white -->
    <linearGradient id="nameGrad" x1="56" y1="100" x2="620" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c0caf5"/>
    </linearGradient>

    <!-- Horizontal accent gradient (line, top bar) -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="0.2"  stop-color="#7aa2f7"/>
      <stop offset="0.6"  stop-color="#bb9af7"/>
      <stop offset="1"    stop-color="#7dcfff" stop-opacity="0"/>
    </linearGradient>

    <!-- Vertical divider gradient: fades in/out top and bottom -->
    <linearGradient id="divLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="0.3"  stop-color="#7aa2f7" stop-opacity="0.75"/>
      <stop offset="0.7"  stop-color="#bb9af7" stop-opacity="0.75"/>
      <stop offset="1"    stop-color="#bb9af7" stop-opacity="0"/>
    </linearGradient>

    <!-- Role label gradient (text fill) -->
    <linearGradient id="roleGrad" x1="752" y1="0" x2="960" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#bb9af7"/>
    </linearGradient>

    <!-- Scan line that sweeps right column -->
    <linearGradient id="scanFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#7aa2f7" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#bb9af7" stop-opacity="0.5"/>
      <stop offset="1"   stop-color="#bb9af7" stop-opacity="0"/>
    </linearGradient>

    <!-- Name bloom (large blur for glow effect) -->
    <filter id="nameBloom" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Line glow (thin horizontal lines) -->
    <filter id="lineGlow" x="-5%" y="-300%" width="110%" height="700%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Dot glow (status indicator) -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="card"><rect width="1280" height="320"/></clipPath>
  </defs>

  <g clip-path="url(#card)">

    <!-- ── BACKGROUND ── -->
    <rect width="1280" height="320" fill="url(#bg)"/>
    <rect width="1280" height="320" fill="url(#leftGlow)"/>
    <rect width="1280" height="320" fill="url(#rightGlow)"/>

    <!-- Very subtle three-line grid -->
    <g stroke="#ffffff" stroke-width="0.5" opacity="0.025">
      <line x1="0" y1="80"  x2="1280" y2="80"/>
      <line x1="0" y1="160" x2="1280" y2="160"/>
      <line x1="0" y1="240" x2="1280" y2="240"/>
    </g>

    <!-- ── TOP ACCENT BAR ── -->
    <rect x="0" y="0" width="1280" height="2" fill="url(#accent)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- ── NAME — the visual anchor ── -->

    <!-- Bloom layer (blue aura behind the name) -->
    <text x="56" y="216"
      font-family="'Arial Black','Helvetica Neue',Impact,'Franklin Gothic Heavy',sans-serif"
      font-weight="900" font-size="155" letter-spacing="-5"
      fill="#3a5aee" opacity="0.28"
      filter="url(#nameBloom)">IDDER</text>

    <!-- Name — sharp layer on top -->
    <text x="56" y="216"
      font-family="'Arial Black','Helvetica Neue',Impact,'Franklin Gothic Heavy',sans-serif"
      font-weight="900" font-size="155" letter-spacing="-5"
      fill="url(#nameGrad)">IDDER</text>

    <!-- Surname — quiet, tracked -->
    <text x="63" y="245"
      font-family="'Helvetica Neue',Arial,sans-serif"
      font-size="13" letter-spacing="10" font-weight="400"
      fill="#2e3555">AIT  ELMOUDEN</text>

    <!-- Accent rule under name — animated shimmer -->
    <rect x="56" y="255" width="500" height="1.5" fill="url(#accent)" filter="url(#lineGlow)">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="3.5s" repeatCount="indefinite"/>
    </rect>

    <!-- ── VERTICAL DIVIDER ── -->
    <rect x="722" y="28" width="1.5" height="264" fill="url(#divLine)"/>

    <!-- Sweep animation across right column -->
    <rect x="722" y="28" width="2" height="264" fill="url(#scanFade)">
      <animate attributeName="x" values="722;1222;722" dur="9s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="opacity" values="0;0.55;0" dur="9s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </rect>

    <!-- ── RIGHT COLUMN ── -->

    <!-- Corner bracket decoration (top-right) -->
    <g stroke="#252c45" stroke-width="1.5" fill="none" stroke-linecap="square">
      <polyline points="1247,34 1262,34 1262,49"/>
    </g>

    <!-- Role label — gradient fill -->
    <text x="752" y="88"
      font-family="'Helvetica Neue',Arial,sans-serif"
      font-size="10" letter-spacing="6" font-weight="700"
      fill="url(#roleGrad)">SOFTWARE ENGINEER</text>

    <!-- Thin rule under role -->
    <rect x="752" y="100" width="110" height="1" fill="#1b2136"/>

    <!-- Descriptors — each bullet a different accent color -->
    <g font-family="'Helvetica Neue',Arial,sans-serif" font-size="15.5">

      <text x="752" y="133">
        <tspan fill="#7aa2f7" font-size="13">▸ </tspan>
        <tspan fill="#c0caf5">I build things — easily the best part</tspan>
      </text>

      <text x="752" y="165">
        <tspan fill="#bb9af7" font-size="13">▸ </tspan>
        <tspan fill="#c0caf5">obsessed with how they actually work</tspan>
      </text>

      <text x="752" y="197">
        <tspan fill="#7dcfff" font-size="13">▸ </tspan>
        <tspan fill="#c0caf5">into where AI is taking all this</tspan>
      </text>

      <text x="752" y="229">
        <tspan fill="#9ece6a" font-size="13">▸ </tspan>
        <tspan fill="#c0caf5">and what's actually worth building</tspan>
      </text>

    </g>

    <!-- ── BOTTOM BAR ── -->
    <rect x="0" y="274" width="1280" height="1" fill="url(#accent)" opacity="0.18"/>

    <!-- Status dot — pulsing green -->
    <circle cx="72" cy="296" r="4.5" fill="#9ece6a" filter="url(#dotGlow)">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>

    <text x="88" y="300"
      font-family="'SF Mono','Cascadia Code',ui-monospace,monospace"
      font-size="11" letter-spacing="2.5" fill="#3a4260">AVAILABLE · FREELANCE &amp; FULL-TIME</text>

    <text x="1218" y="300" text-anchor="end"
      font-family="'SF Mono',ui-monospace,monospace"
      font-size="11" letter-spacing="2" fill="#3a4260">AGADIR, MOROCCO</text>

  </g>
</svg>
