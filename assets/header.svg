<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Idder Ait Elmouden — Full-Stack Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="0.5" stop-color="#bb9af7"/>
      <stop offset="1" stop-color="#7dcfff"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.4 0;0.4 0;-0.4 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c0caf5"/>
      <stop offset="1" stop-color="#a9b1d6"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#7aa2f7" stop-opacity="1"/>
      <stop offset="0.7" stop-color="#bb9af7" stop-opacity="1"/>
      <stop offset="1" stop-color="#bb9af7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card"><rect width="1280" height="320" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect width="1280" height="320" fill="url(#bg)"/>

    <!-- Subtle dot grid texture -->
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.8" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <rect width="1280" height="320" fill="url(#dots)"/>

    <!-- Left glow bleed — ambient light -->
    <ellipse cx="200" cy="160" rx="280" ry="180" fill="#7aa2f7" opacity="0.04"/>
    <ellipse cx="1080" cy="160" rx="240" ry="160" fill="#bb9af7" opacity="0.04"/>

    <!-- NAME — the anchor -->
    <text x="64" y="160"
      font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
      font-weight="900" font-size="108" letter-spacing="-2"
      fill="url(#nameGrad)">IDDER</text>

    <!-- Surname — quieter, tracked -->
    <text x="68" y="196"
      font-family="'Helvetica Neue',Arial,sans-serif"
      font-size="16" letter-spacing="9" font-weight="400"
      fill="#565f89">AIT  ELMOUDEN</text>

    <!-- Accent rule under name -->
    <rect x="64" y="210" width="380" height="2" fill="url(#fade)" filter="url(#softglow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Right column — what matters -->
    <!-- Vertical divider -->
    <rect x="700" y="56" width="1" height="208" fill="#21262d"/>

    <!-- Role label -->
    <text x="732" y="90"
      font-family="'Helvetica Neue',Arial,sans-serif"
      font-size="10" letter-spacing="5" fill="#7aa2f7"
      font-weight="700">FULL-STACK ENGINEER</text>

    <!-- Key signals — not languages, CAPABILITIES -->
    <g font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#a9b1d6">
      <text x="732" y="124">▸  End-to-end ownership — idea to production</text>
      <text x="732" y="152">▸  Systems depth: malloc → React → Shopify</text>
      <text x="732" y="180">▸  AI-era judgment — I verify what AI generates</text>
      <text x="732" y="208">▸  1337 / 42 Network · peer-reviewed · no shortcuts</text>
    </g>

    <!-- Bottom strip -->
    <rect x="0" y="262" width="1280" height="1" fill="#21262d"/>

    <!-- Status dot -->
    <circle cx="76" cy="290" r="4" fill="#9ece6a" filter="url(#softglow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="90" y="294"
      font-family="'SF Mono','Cascadia Code',ui-monospace,monospace"
      font-size="11" letter-spacing="2" fill="#414868">AVAILABLE · FREELANCE &amp; FULL-TIME</text>

    <text x="1216" y="294" text-anchor="end"
      font-family="'SF Mono',ui-monospace,monospace"
      font-size="11" letter-spacing="2" fill="#414868">AGADIR, MOROCCO · BUILDING FOR THE WORLD</text>
  </g>
</svg>
