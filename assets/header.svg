<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Idder Ait Elmouden — Software Engineer">
  <defs>

    <!-- Card background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0d1326"/>
    </linearGradient>

    <!-- Bright name gradient: cyan → blue → purple → magenta -->
    <linearGradient id="nameGrad" x1="56" y1="0" x2="640" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#5ad8ff"/>
      <stop offset="0.38" stop-color="#7aa2f7"/>
      <stop offset="0.72" stop-color="#bb9af7"/>
      <stop offset="1"    stop-color="#f3a4dd"/>
    </linearGradient>

    <!-- Left accent bar: teal → cyan -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2bd4a8"/>
      <stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>

    <!-- Orbital arc gradients -->
    <linearGradient id="arcCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ad8ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5ad8ff"/>
    </linearGradient>
    <linearGradient id="arcPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bb9af7" stop-opacity="0"/>
      <stop offset="1" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="arcPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3a4dd" stop-opacity="0"/>
      <stop offset="1" stop-color="#f3a4dd"/>
    </linearGradient>

    <!-- Name aura -->
    <filter id="nameAura" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Dot / glow filter -->
    <filter id="glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="round"><rect width="1280" height="320" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#round)">

    <!-- ── BACKGROUND ── -->
    <rect width="1280" height="320" rx="18" fill="url(#bg)"/>

    <!-- Soft ambient glows -->
    <ellipse cx="330" cy="120" rx="340" ry="90"  fill="#3b5bd9" opacity="0.13"/>
    <ellipse cx="1075" cy="160" rx="210" ry="180" fill="#9d5ad8" opacity="0.12"/>

    <!-- Fine grid -->
    <g stroke="#9fb0e0" stroke-width="0.5" opacity="0.05">
      <line x1="0" y1="64"  x2="1280" y2="64"/>
      <line x1="0" y1="128" x2="1280" y2="128"/>
      <line x1="0" y1="192" x2="1280" y2="192"/>
      <line x1="0" y1="256" x2="1280" y2="256"/>
    </g>

    <!-- ── ORBITAL SYSTEM (right) ── -->
    <g transform="translate(1075,158)">

      <!-- static faint rings -->
      <circle r="118" fill="none" stroke="#2b3559" stroke-width="1" opacity="0.55"/>
      <circle r="86"  fill="none" stroke="#2b3559" stroke-width="1" opacity="0.55"/>
      <circle r="54"  fill="none" stroke="#2b3559" stroke-width="1" opacity="0.55"/>

      <!-- outer ring — cyan arc + orbiting dot -->
      <g>
        <circle r="118" fill="none" stroke="url(#arcCyan)" stroke-width="3.2"
          stroke-linecap="round" stroke-dasharray="190 552" transform="rotate(20)"/>
        <circle cx="118" cy="0" r="5" fill="#7de3ff" filter="url(#glow)"/>
        <animateTransform attributeName="transform" type="rotate"
          from="0" to="360" dur="26s" repeatCount="indefinite"/>
      </g>

      <!-- middle ring — purple arc, reverse -->
      <g>
        <circle r="86" fill="none" stroke="url(#arcPurple)" stroke-width="3.2"
          stroke-linecap="round" stroke-dasharray="150 391" transform="rotate(140)"/>
        <circle cx="-86" cy="0" r="4.5" fill="#c8abff" filter="url(#glow)"/>
        <animateTransform attributeName="transform" type="rotate"
          from="360" to="0" dur="19s" repeatCount="indefinite"/>
      </g>

      <!-- inner ring — pink arc -->
      <g>
        <circle r="54" fill="none" stroke="url(#arcPink)" stroke-width="3.2"
          stroke-linecap="round" stroke-dasharray="120 220" transform="rotate(60)"/>
        <circle cx="54" cy="0" r="4" fill="#f7b3e3" filter="url(#glow)"/>
        <animateTransform attributeName="transform" type="rotate"
          from="0" to="360" dur="13s" repeatCount="indefinite"/>
      </g>

      <!-- core -->
      <circle r="15" fill="#5ad8ff" opacity="0.14"/>
      <circle r="6" fill="#a6ecff" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.5;1" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- ── LEFT ACCENT BAR ── -->
    <rect x="40" y="48" width="3" height="224" rx="1.5" fill="url(#barGrad)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.6s" repeatCount="indefinite"/>
    </rect>

    <!-- ── TERMINAL PROMPT ── -->
    <text x="64" y="74" font-family="'SF Mono','JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="15">
      <tspan fill="#2bd4a8" font-weight="600">idder@</tspan><tspan fill="#5ad8ff" font-weight="600">1337</tspan><tspan fill="#3a4364">:~$</tspan><tspan fill="#c8d3f5"> ./introduce</tspan>
    </text>

    <!-- ── NAME ── -->
    <!-- aura layer -->
    <text x="64" y="142"
      font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-weight="800" font-size="56" letter-spacing="-1"
      fill="#5a7bf0" opacity="0.32" filter="url(#nameAura)">Idder Ait Elmouden</text>
    <!-- sharp layer + blinking cursor -->
    <text x="64" y="142"
      font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-weight="800" font-size="56" letter-spacing="-1"
      fill="url(#nameGrad)">Idder Ait Elmouden<tspan dx="12" font-size="44" fill="#5ad8ff" font-weight="400">▌<animate attributeName="fill-opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite" calcMode="discrete"/></tspan></text>

    <!-- ── SAYINGS (our voice) ── -->
    <g font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15.5" fill="#c8d3f5">
      <text x="66" y="184"><tspan fill="#5ad8ff" font-weight="700">▸ </tspan>I build things — easily the best part</text>
      <text x="66" y="212"><tspan fill="#7aa2f7" font-weight="700">▸ </tspan>obsessed with how they actually work</text>
      <text x="66" y="240"><tspan fill="#bb9af7" font-weight="700">▸ </tspan>into where AI is taking all this</text>
      <text x="66" y="268"><tspan fill="#f3a4dd" font-weight="700">▸ </tspan>and what's actually worth building</text>
    </g>

    <!-- ── BOTTOM STRIP ── -->
    <line x1="64" y1="290" x2="660" y2="290" stroke="#1c2440" stroke-width="1"/>

    <circle cx="70" cy="306" r="4" fill="#9ece6a" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.25;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="84" y="310"
      font-family="'SF Mono',ui-monospace,monospace" font-size="11"
      letter-spacing="2" fill="#4a5578">AVAILABLE · FREELANCE &amp; FULL-TIME</text>

    <text x="1216" y="310" text-anchor="end"
      font-family="'SF Mono',ui-monospace,monospace" font-size="11"
      letter-spacing="2" fill="#4a5578">AGADIR, MOROCCO</text>

  </g>
</svg>
